services:

  crawl:
    build: .
    image: sri-app
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./indexes:/app/indexes
    command: >
      /bin/sh -c "
        uv run scrapy crawl xataka_mobile > logs/xataka_mobile.log 2>&1 &
        uv run scrapy crawl xataka_pc     > logs/xataka_pc.log 2>&1 &
        wait && echo 'All spiders finished.'
      "

  index:
    image: sri-app
    depends_on:
      - crawl
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
    command: uv run python -m src.indexing.indexer

  chroma:
    image: chromadb/chroma:0.6.0
    volumes:
      - ./indexes/chroma:/chroma/data
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data

  vector-index:
    image: sri-app
    depends_on:
      - index
      - chroma
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
    command: uv run python main.py --build

  query:
    image: sri-app
    depends_on:
      - vector-index
      - chroma
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
    stdin_open: true
    tty: true
    command: uv run python main.py --query
